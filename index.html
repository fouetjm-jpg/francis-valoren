<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Œuvres – Francis Valoren</title>

    <meta name="description" content="Site officiel de Francis Valoren, auteur.">

    <link rel="stylesheet" href="style.css">

    <!-- Police élégante -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- FOND -->
    <div class="background-overlay"></div>

    <!-- HEADER -->
<header>
    <div class="logo">Francis Valoren <span>Auteur</span></div>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="contact.html">Contact</a>
        <a href="Biographie.html">Biographie</a>
    </nav>
</header>

    <!-- HERO -->
    <section class="hero">

        <!-- TEXTE -->
        <div class="hero-text">

            <h1>Francis<br>Valoren</h1>

            <div class="line"></div>

            <h2>Auteur.</h2>

            <p>
                « Auto‑édité par choix, libre par nécessité et j’écris pour celles et ceux qui refusent d’abandonner leurs rêves. »
            </p>

          <a href="oeuvres.html" class="btn">
            Découvrir mes œuvres
          </a>

        </div>

        <!-- LIVRE ANIMÉ -->
        <div class="book-scene">
            <div class="book-container">
                <div class="book">

                    <div class="page" data-title="Les Effaceurs – Tome 1"></div>
                    <div class="page" data-title="Les Effaceurs – Tome 2"></div>
                    <div class="page" data-title="Les Oubliés de la Terre"></div>
                    <div class="page" data-title="Le Dernier Souffle"></div>

                </div>
            </div>
        </div>

    </section>

    <!-- SCRIPT ANIMATION DES PAGES -->
    <script>
    const pages = document.querySelectorAll('.page');

    pages.forEach((page, index) => {
        setTimeout(() => {
            page.style.transform = "rotateY(-180deg)";
            page.innerHTML = `<div>${page.dataset.title}</div>`;
        }, index * 2000);
    });
    </script>

</body>

</html>
